<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Danke für Ihr Interesse | Seraphin Solutions</title>

    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="shortcut icon" type="image/x-icon" href="favicon.ico">
    <meta name="robots" content="noindex, follow">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 32px;
            padding: 24px;
            text-align: center;
            background: #ffffff;
            color: #0f172a;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        .danke-icon {
            width: 128px;
            height: 128px;
            animation: danke-pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        .danke-icon svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        .danke-circle {
            fill: none;
            stroke: url(#danke-gradient);
            stroke-width: 3;
            stroke-linecap: round;
            stroke-dasharray: 151;
            stroke-dashoffset: 151;
            animation: danke-draw 0.7s ease-out forwards;
        }

        .danke-check {
            fill: none;
            stroke: url(#danke-gradient);
            stroke-width: 4;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 36;
            stroke-dashoffset: 36;
            animation: danke-draw 0.4s ease-out 0.6s forwards;
        }

        .danke-text {
            font-size: clamp(1.5rem, 5vw, 2.25rem);
            font-weight: 800;
            letter-spacing: -0.02em;
            opacity: 0;
            animation: danke-fade 0.6s ease-out 0.95s forwards;
        }

        @keyframes danke-draw {
            to { stroke-dashoffset: 0; }
        }

        @keyframes danke-pop {
            from { transform: scale(0.6); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        @keyframes danke-fade {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (prefers-reduced-motion: reduce) {
            .danke-icon,
            .danke-circle,
            .danke-check,
            .danke-text {
                animation: none;
            }
            .danke-circle,
            .danke-check { stroke-dashoffset: 0; }
            .danke-text { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="danke-icon" aria-hidden="true">
        <svg viewBox="0 0 52 52">
            <defs>
                <linearGradient id="danke-gradient" x1="0" y1="0" x2="1" y2="1">
                    <stop offset="0%" stop-color="#32A71A"/>
                    <stop offset="100%" stop-color="#008CFF"/>
                </linearGradient>
            </defs>
            <circle class="danke-circle" cx="26" cy="26" r="24"/>
            <path class="danke-check" d="M15 27 l7 7 l15 -15"/>
        </svg>
    </div>
    <h1 class="danke-text">Danke für Ihr Interesse</h1>

    <!-- Vercel Web Analytics -->
    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
