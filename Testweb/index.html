    />
    <meta name="theme-color" content="#2563eb" />
    <script>
      /*
       * Basis-URL-Fix: Die Web-Version wird in einem Unterordner deployt (z. B.
       * /navi/ oder /Test/). Ruft man sie OHNE abschließenden Slash auf
       * (…/Test), würden relative Pfade (./assets/…, ./manifest.json) fälschlich
       * gegen die Domain-Wurzel aufgelöst (…/assets/…) und mit falschem MIME-Typ
       * blockiert. Dieses Skript setzt daher vor allen Asset-Tags eine <base>-URL
       * auf das Verzeichnis der Seite, sodass alles korrekt in den Unterordner lädt.
       */
      (function () {
        try {
          var path = location.pathname || '/';
          var last = path.slice(path.lastIndexOf('/') + 1);
          var base = last.indexOf('.') !== -1
            ? path.slice(0, path.lastIndexOf('/') + 1)        // Dateiname -> Verzeichnis
            : (path.charAt(path.length - 1) === '/' ? path : path + '/');
          var b = document.createElement('base');
          b.href = base;
          document.head.appendChild(b);
        } catch (e) { /* im Zweifel Standardverhalten */ }
      })();
    </script>

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
